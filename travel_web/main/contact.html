<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Form</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(rgba(0, 0, 0, 0.5),
                    rgba(0, 0, 0, 0.5)),
                url('../assets/image/image.png');
                background-size: cover;
                background-position: center;
                
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;

}

.form{
    /* background:white; */
    backdrop-filter: blur(10px);
    box-shadow: 5px 5px 15px white;
    padding:20px;
    width:450px;
    height: 550;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);

}

h2{
    text-align:center;
    color: white;
}

.input-box{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    color: white;
}

input, textarea{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

textarea{
    height:100px;
}

button{
    width:100%;
    padding:10px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}
</style>
</head>

<body>

<form class="form">
    <h2>Contact Us</h2>

    <div class="input-box">
        <label>Name</label>
        <input type="text" placeholder="Enter your name" required>
    </div>

    <div class="input-box">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>
    </div>

    <div class="input-box">
        <label>Message</label>
        <textarea placeholder="Write your message" required></textarea>
    </div>

    <button type="submit">Send</button>
</form>

</body>
</html>
