<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">

    
   
    
</head>

<body>
    <div>
    <form>
    <h1>Registration Form</h1>
    <label for="fname">First Name:</label><br>
    <input type="text" id="fname" name="fname"><br><br>
    <label for="lname">Last Name:</label><br>
    <input type="text" name="lname" id="lname"><br><br>
    <label for="email">Email:</label><br>
    <input type="email" name="email" id="email"><br><br>
    <label for="password">Password</label><br>
    <input type="password" name="Password" id="Password">
    <br><br>
    <label for="password" Re-type password>Re-type password</label><br>
    <input type="password" name="Password" id="Password">
    <br><br>

    <label for="contact">Contact:</label><br>
    <input type="contact" id="contact" name="contact"><br><br>
    <label for="gender">Gender:</label>
    <select name="gender" id="gender">
        <option value="--Select--" selected disabled>Select</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
        <option value="Other">Other</option>
    </select><br><br>
    <button>Submit</button><br><br>
    <label for="phone">Enter your phone</label><br>
    <input type="tel" name="phone" id="phone" placeholder="123-45-678" pattern="[0-9]{10}">

</div>
</form>
</body>

</html>
