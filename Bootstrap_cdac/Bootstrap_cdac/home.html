<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Demo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        nav a:active{
            color:red;
        }

        .profile-img{
            width:150px;
            height:150px;
            object-fit:cover;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar bg-warning justify-content-end p-2">
        <a href="#" class="text-decoration-none me-3">Home</a>
        <a href="#" class="text-decoration-none me-3">About</a>
        <a href="#" class="text-decoration-none me-3">Contact us</a>
        <a href="#" class="text-decoration-none me-3">Signup</a>
        <a href="#" class="text-decoration-none">Signin</a>
    </nav>

    <!-- Circular Image -->
    <div class="container mt-4">
        <img src="image.png"
             alt="Profile Image"
             class="rounded-circle profile-img">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
