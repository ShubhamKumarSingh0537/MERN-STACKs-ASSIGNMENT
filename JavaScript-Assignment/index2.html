<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vowels</title>
</head>

<body>
    <script>
        // Question:2: count the number of vowels in a string using a function

        let str = "JavaScript";
        let count = 0;
        for (let ch of str.toLowerCase()) {
            if ("aeiou".includes(ch)) {
                count++;
            }
        }

        console.log("Number of vowels:", count);

    </script>
</body>

</html>
